const { useState, useEffect, useRef, useCallback } = React;

// ─── FIREBASE HELPERS ─────────────────────────────────────────────────────────
const getFirebase = () => window.__firebase;

// ─── DATE HELPERS ─────────────────────────────────────────────────────────────
const fmtKey = (d) => d.toISOString().slice(0,10);
const todayKey = () => fmtKey(new Date());
const offsetKey = (n) => { const d=new Date(); d.setDate(d.getDate()+n); return fmtKey(d); };
const keyLabel = (k) => {
  const t=todayKey(), y=offsetKey(-1);
  if(k===t) return "Today";
  if(k===y) return "Yesterday";
  return new Date(k+'T12:00:00').toLocaleDateString("en",{weekday:"short",month:"short",day:"numeric"});
};

// ─── CALCULATIONS ─────────────────────────────────────────────────────────────
const calcBMR = ({gender,weight,height,age}) =>
  gender==="male" ? 10*weight+6.25*height-5*age+5 : 10*weight+6.25*height-5*age-161;
const ACT = {sedentary:1.2,lightly:1.375,moderately:1.55,very:1.725};
const calcTDEE = (bmr,act) => bmr*(ACT[act]||1.375);

function calcMacros(tdee, goal, weight, weightDiff, weeks) {
  let cal, p, f, c;
  if (goal==="cutting") {
    const totalDeficit = Math.abs(weightDiff) * 7700;
    const weeklyDeficit = weeks > 0 ? totalDeficit / weeks : 500;
    const dailyDeficit = weeklyDeficit / 7;
    cal = Math.max(tdee - dailyDeficit, 1200);
    p = weight * 2.2;
    f = (cal * 0.25) / 9;
    c = (cal - p*4 - f*9) / 4;
  } else if (goal==="bulking") {
    const totalSurplus = Math.abs(weightDiff) * 7700;
    const weeklyS = weeks > 0 ? totalSurplus / weeks : 300;
    const dailyS = weeklyS / 7;
    cal = Math.min(tdee + dailyS, tdee + 700);
    p = weight * 2.0;
    f = (cal * 0.28) / 9;
    c = (cal - p*4 - f*9) / 4;
  } else {
    cal = tdee;
    p = weight * 1.8;
    f = (cal * 0.28) / 9;
    c = (cal - p*4 - f*9) / 4;
  }
  return {
    calories: Math.round(cal),
    protein:  Math.round(p),
    fat:      Math.round(f),
    carbs:    Math.round(Math.max(c, 50)),
  };
}

function validateGoal(goal, weight, targetWeight, weeks, tdee) {
  const diff = targetWeight - weight;
  const warnings = [];
  let severity = "ok";

  if (goal === "cutting") {
    if (diff >= 0) return { severity:"warn", warnings:["Your target weight is higher than or equal to your current weight. Switch to Bulking or Maintenance."] };
    const totalKg = Math.abs(diff);
    const kgPerWeek = totalKg / Math.max(weeks, 1);
    const dailyDeficit = (kgPerWeek * 7700) / 7;
    const targetCal = tdee - dailyDeficit;
    if (kgPerWeek > 1.5) {
      severity = "danger";
      warnings.push(`⚠️ UNHEALTHY: Losing ${kgPerWeek.toFixed(1)} kg/week requires a ${Math.round(dailyDeficit)} kcal/day deficit. This is extreme starvation territory and risks severe muscle loss, nutrient deficiencies, metabolic damage, and serious health consequences.`);
      warnings.push("A safe maximum is 0.5–1 kg/week. Please extend your timeline or adjust your target.");
    } else if (kgPerWeek > 1.0) {
      severity = "warn";
      warnings.push(`⚠️ Aggressive: Losing ${kgPerWeek.toFixed(1)} kg/week (${Math.round(dailyDeficit)} kcal deficit/day) is on the aggressive side. You may experience fatigue, hunger, and some muscle loss. Consider slowing down.`);
    } else if (kgPerWeek < 0.2 && weeks < 52) {
      severity = "ok";
      warnings.push(`ℹ️ Very slow pace (${kgPerWeek.toFixed(2)} kg/week). This is sustainable but may take longer than expected.`);
    }
    if (targetCal < 1200) {
      severity = "danger";
      warnings.push(`🚨 Your required calorie intake (${Math.round(targetCal)} kcal/day) falls below the safe minimum of 1200 kcal. The app will set 1200 kcal as your floor. Extend your timeline.`);
    }
  }

  if (goal === "bulking") {
    if (diff <= 0) return { severity:"warn", warnings:["Your target weight is lower than or equal to your current weight. Switch to Cutting or Maintenance."] };
    const totalKg = Math.abs(diff);
    const kgPerWeek = totalKg / Math.max(weeks, 1);
    const dailySurplus = (kgPerWeek * 7700) / 7;
    if (kgPerWeek > 0.75) {
      severity = "danger";
      warnings.push(`⚠️ UNREALISTIC: Gaining ${kgPerWeek.toFixed(2)} kg/week requires a +${Math.round(dailySurplus)} kcal/day surplus. Natural muscle gain is 0.1–0.25 kg/week maximum. Beyond this, most gain will be fat.`);
      warnings.push("Recommended: 0.1–0.25 kg/week lean gain. Extend your timeline or lower target weight.");
    } else if (kgPerWeek > 0.3) {
      severity = "warn";
      warnings.push(`⚠️ Aggressive bulk: ${kgPerWeek.toFixed(2)} kg/week will include significant fat gain alongside muscle. Consider a slower lean bulk (0.1–0.2 kg/week).`);
    }
    if (dailySurplus > 700) {
      severity = "danger";
      warnings.push(`🚨 Required surplus of +${Math.round(dailySurplus)} kcal/day is capped at +700 kcal to prevent excessive fat gain.`);
    }
  }

  return { severity, warnings };
}

// ─── UNIT CONVERSION ──────────────────────────────────────────────────────────
function toGrams(food,qty,unit){
  if(unit==="g"||unit==="ml") return qty;
  if(unit==="cup")   return qty*(food.cupG  ||240);
  if(unit==="tbsp")  return qty*(food.tbspG ||15);
  if(unit==="tsp")   return qty*(food.tspG  ||5);
  if(unit==="scoop") return qty*(food.scoopG||30);
  if(unit==="piece") return qty*(food.pieceG||100);
  return qty;
}

function Ring({value,max,color,size=80,stroke=8,label,sub}){
  const r=(size-stroke)/2,circ=2*Math.PI*r,off=circ-Math.min(value/max,1)*circ;
  return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
      <svg width={size} height={size} style={{transform:"rotate(-90deg)"}}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#EDE8DE" strokeWidth={stroke}/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke} strokeDasharray={circ} strokeDashoffset={off} strokeLinecap="round" style={{transition:"stroke-dashoffset .55s cubic-bezier(.4,0,.2,1)"}}/>
        <text x={size/2} y={size/2} textAnchor="middle" dominantBaseline="central"
          style={{transform:`rotate(90deg)`,transformOrigin:`${size/2}px ${size/2}px`,fill:"#fff",fontSize:size>90?14:12,fontWeight:700,fontFamily:"DM Sans,sans-serif"}}>
          {Math.round(value)}
        </text>
      </svg>
      <div style={{textAlign:"center"}}>
        <div style={{color,fontSize:10,fontWeight:700,letterSpacing:".08em",textTransform:"uppercase"}}>{label}</div>
        {sub&&<div style={{color:"#6B6560",fontSize:9}}>{sub}</div>}
      </div>
    </div>
  );
}

function Bar({label,value,max,color,unit="g"}){
  const pct=Math.min((value/max)*100,100);
  return(
    <div style={{marginBottom:11}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:4,fontSize:12}}>
        <span style={{color:"#1A1814",fontWeight:600}}>{label}</span>
        <span style={{color:"#6B6560"}}>{Math.round(value)}<span style={{color:"#A8A09A"}}>/{Math.round(max)}{unit}</span></span>
      </div>
      <div style={{height:6,background:"#EDE8DE",borderRadius:99,overflow:"hidden"}}>
        <div style={{height:"100%",width:`${pct}%`,background:color,borderRadius:99,transition:"width .5s ease"}}/>
      </div>
    </div>
  );
}

function WtChart({data}){
  const ws=data.map(d=>d.weight).filter(Boolean);
  if(ws.length<2) return <div style={{color:"#A8A09A",fontSize:13,textAlign:"center",padding:"18px 0"}}>Log weight in Progress tab to see your trend 📈</div>;
  const mn=Math.min(...ws)-.5,mx=Math.max(...ws)+.5,W=300,H=70,p=16;
  const pts=data.map((d,i)=>({x:p+(i/(data.length-1))*(W-p*2),y:d.weight?H-((d.weight-mn)/(mx-mn))*H:null,...d}));
  const valid=pts.filter(x=>x.y!==null);
  const path=valid.map((x,i)=>`${i===0?"M":"L"} ${x.x} ${x.y}`).join(" ");
  return(
    <svg width="100%" viewBox={`0 0 ${W} ${H+20}`} style={{overflow:"visible"}}>
      <defs><linearGradient id="wg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#C17A4A" stopOpacity=".3"/><stop offset="100%" stopColor="#C17A4A" stopOpacity="0"/></linearGradient></defs>
      {path&&<><path d={`${path} L ${valid[valid.length-1].x} ${H} L ${valid[0].x} ${H} Z`} fill="url(#wg)"/><path d={path} fill="none" stroke="#C17A4A" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/></>}
      {pts.map((x,i)=>x.y!==null&&<circle key={i} cx={x.x} cy={x.y} r="3.5" fill="#C17A4A"/>)}
      {data.map((d,i)=><text key={i} x={p+(i/(data.length-1))*(W-p*2)} y={H+16} textAnchor="middle" style={{fill:"#A8A09A",fontSize:10}}>{d.label}</text>)}
    </svg>
  );
}

// ─── AUTH SCREEN ──────────────────────────────────────────────────────────────
function AuthScreen({onAuth}){
  const [mode,setMode]=useState("login"); // login | register
  const [email,setEmail]=useState("");
  const [password,setPassword]=useState("");
  const [name,setName]=useState("");
  const [err,setErr]=useState("");
  const [loading,setLoading]=useState(false);

  const handle=async()=>{
    setErr(""); setLoading(true);
    const { auth, createUserWithEmailAndPassword, signInWithEmailAndPassword, db, doc, setDoc, getDoc } = getFirebase();
    try {
      if(mode==="register"){
        if(!name.trim()){setErr("Please enter your name.");setLoading(false);return;}
        const cred = await createUserWithEmailAndPassword(auth, email, password);
        // Create user profile doc
        await setDoc(doc(db,"users",cred.user.uid),{
          email: cred.user.email,
          name: name.trim(),
          createdAt: new Date().toISOString(),
          onboarded: false,
        });
        onAuth(cred.user);
      } else {
        const cred = await signInWithEmailAndPassword(auth, email, password);
        onAuth(cred.user);
      }
    } catch(e){
      const msgs={
        "auth/email-already-in-use":"This email is already registered. Try logging in.",
        "auth/invalid-email":"Please enter a valid email address.",
        "auth/weak-password":"Password must be at least 6 characters.",
        "auth/user-not-found":"No account found with this email.",
        "auth/wrong-password":"Incorrect password. Please try again.",
        "auth/invalid-credential":"Invalid email or password.",
        "auth/too-many-requests":"Too many attempts. Please try again later.",
      };
      setErr(msgs[e.code]||e.message);
    }
    setLoading(false);
  };

  return(
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"#F5F0E8",color:"#fff",padding:24}}>
      <div style={{width:"100%",maxWidth:380}}>

            <div style={{fontFamily:"'Fraunces',Georgia,serif",fontSize:20,fontWeight:700,letterSpacing:"-.01em",color:"#1A1814"}}>MacroTrack Pro</div>
            <div style={{fontSize:12,color:"#A8A09A"}}>Built for serious athletes</div>
          </div>
        </div>

        {/* Tab toggle */}
        <div style={{display:"flex",background:"#EDE8DE",borderRadius:14,padding:4,marginBottom:28,gap:4}}>
          {["login","register"].map(m=>(
            <button key={m} onClick={()=>{setMode(m);setErr("");}} style={{flex:1,background:mode===m?"rgba(193,122,74,.12)":"none",color:mode===m?"#C17A4A":"#6B6560",border:`1px solid ${mode===m?"rgba(193,122,74,.25)":"transparent"}`,borderRadius:10,padding:"9px 0",fontWeight:700,fontSize:13,cursor:"pointer",fontFamily:"DM Sans,sans-serif",transition:"all .2s"}}>

              <label style={S.lbl}>Your Name</label>
              <input style={S.inp} placeholder="e.g. Alex" value={name} onChange={e=>setName(e.target.value)}/>

// ─── DATE SELECTOR ────────────────────────────────────────────────────────────
function DayPicker({activeKey,onChange}){
  const days=Array.from({length:7},(_,i)=>{
    const k=offsetKey(-i);
    return {key:k, label:i===0?"Today":i===1?"Yesterday":new Date(k+'T12:00:00').toLocaleDateString("en",{weekday:"short",month:"short",day:"numeric"})};
  });
  return(
    <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:4}}>
      {days.map(d=>(
        <button key={d.key} onClick={()=>onChange(d.key)} style={{
          background:activeKey===d.key?"#C17A4A":"#EDE8DE",
          color:activeKey===d.key?"#fff":"rgba(255,255,255,.55)",
          border:`1px solid ${activeKey===d.key?"#C17A4A":"#DDD6CC"}`,
          borderRadius:10,padding:"7px 12px",fontWeight:700,fontSize:11,
          cursor:"pointer",whiteSpace:"nowrap",flexShrink:0,fontFamily:"DM Sans,sans-serif",
        }}>{d.label}</button>
      ))}
    </div>
  );
}

// ─── DASHBOARD ────────────────────────────────────────────────────────────────
function Dashboard({targets,daily,last7,profile,onCommit,activeDay,setActiveDay,blank}){
  const [showModal,setShowModal]=useState(false);
  const log=daily[activeDay]||blank;
  const committed=!!log.committed;
  const consumed=Object.values(log.meals).flat().reduce((a,f)=>({cal:a.cal+f.cal,p:a.p+f.p,c:a.c+f.c,fat:a.fat+f.fat}),{cal:0,p:0,c:0,fat:0});
  const bonus=(log.exercises||[]).reduce((a,e)=>a+(e.burned||0),0);
  const totalCal=targets.calories+Math.round(bonus);
  const remCal=Math.max(totalCal-Math.round(consumed.cal),0);
  const remP=Math.max(targets.protein-Math.round(consumed.p),0);
  const remC=Math.max(targets.carbs-Math.round(consumed.c),0);
  const remF=Math.max(targets.fat-Math.round(consumed.fat),0);
  const allFoods=Object.values(log.meals).flat();
  const isToday=activeDay===todayKey();
  return(
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      {showModal&&<CommitModal onConfirm={()=>{onCommit(activeDay);setShowModal(false);}} onCancel={()=>setShowModal(false)}/>}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={{fontSize:14,color:"#6B6560"}}>
          {profile?.name||"Athlete"} · <span style={{color:"#C17A4A",fontWeight:700}}>{(profile?.goal||"").toUpperCase()}</span>
        </div>
        {isToday&&(committed
          ?<div style={{background:"rgba(193,122,74,.1)",border:"1px solid rgba(110,231,183,.3)",borderRadius:10,padding:"5px 12px",fontSize:11,color:"#C17A4A",fontWeight:700}}>✓ Committed</div>
          :<button onClick={()=>setShowModal(true)} style={{...S.btn("#D4956A",{width:"auto",padding:"6px 14px",fontSize:12,borderRadius:10})}}>Commit Day 🔒</button>
        )}
      </div>

      <DayPicker activeKey={activeDay} onChange={setActiveDay}/>

      <div style={{...S.card(),display:"flex",alignItems:"center",gap:20}}>
        <Ring value={Math.round(consumed.cal)} max={totalCal} color="#C17A4A" size={104} stroke={10} label="kcal" sub={`of ${totalCal}`}/>
        <div>
          <div style={{fontSize:12,color:"#6B6560",marginBottom:4}}>{activeDay===todayKey()?"Remaining Today":keyLabel(activeDay)}</div>
          <div style={{fontSize:38,fontWeight:900,letterSpacing:"-.04em",color:"#C17A4A",lineHeight:1}}>{remCal}</div>
          <div style={{fontSize:12,color:"#A8A09A",marginTop:2}}>kcal left</div>
          {bonus>0&&<div style={{fontSize:11,color:"#D4956A",marginTop:5}}>+{Math.round(bonus)} kcal from training 🔥</div>}
        </div>
      </div>

      <div style={{...S.card(),display:"flex",justifyContent:"space-around"}}>
        <Ring value={Math.round(consumed.p)}   max={targets.protein} color="#6B8CAE" size={78} stroke={7} label="Protein" sub={`${remP}g left`}/>
        <Ring value={Math.round(consumed.c)}   max={targets.carbs}   color="#9b87c7" size={78} stroke={7} label="Carbs"   sub={`${remC}g left`}/>
        <Ring value={Math.round(consumed.fat)} max={targets.fat}     color="#D4956A" size={78} stroke={7} label="Fats"    sub={`${remF}g left`}/>
      </div>

      <div style={S.card()}>
        <div style={{fontSize:12,fontWeight:700,marginBottom:14,color:"#6B6560",letterSpacing:".08em",textTransform:"uppercase"}}>Weight · 7 Days</div>
        <WtChart data={last7}/>
      </div>

      {(log.exercises||[]).length>0&&(
        <div style={S.card()}>
          <div style={{fontSize:12,fontWeight:700,marginBottom:10,color:"#6B6560",letterSpacing:".08em",textTransform:"uppercase"}}>Training · 🔥 {Math.round(bonus)} kcal</div>
          {log.exercises.map((e,i)=><div key={i} style={{display:"flex",justifyContent:"space-between",fontSize:13,padding:"4px 0",borderBottom:"1px solid rgba(255,255,255,.05)"}}><span>{e.name}</span><span style={{color:"#D4956A"}}>{e.sets}×{e.reps} · 🔥{Math.round(e.burned)}</span></div>)}
        </div>
      )}

      <div style={S.card()}>
        <div style={{fontSize:12,fontWeight:700,marginBottom:12,color:"#6B6560",letterSpacing:".08em",textTransform:"uppercase"}}>Meals</div>
        {Object.entries(log.meals).map(([meal,foods])=>foods.length>0&&(
          <div key={meal} style={{marginBottom:10}}>
            <div style={{fontSize:11,color:"#6B6560",fontWeight:700,textTransform:"capitalize",marginBottom:4}}>{meal}</div>
            {foods.map((fd,i)=><div key={i} style={{display:"flex",justifyContent:"space-between",fontSize:13,padding:"3px 0",borderBottom:"1px solid rgba(255,255,255,.04)"}}><span>{fd.name} <span style={{color:"#A8A09A"}}>({fd.dq}{fd.du})</span></span><span style={{color:"#C17A4A"}}>{Math.round(fd.cal)} kcal</span></div>)}
          </div>
        ))}
        {allFoods.length===0&&<div style={{color:"#A8A09A",fontSize:13,textAlign:"center",padding:"10px 0"}}>No meals logged for {keyLabel(activeDay)}</div>}
      </div>

      <div style={{...S.card(),background:"rgba(193,122,74,.06)",border:"1px solid rgba(110,231,183,.2)"}}>
        <div style={{fontSize:11,color:"#C17A4A",fontWeight:700,letterSpacing:".08em",textTransform:"uppercase",marginBottom:6}}>💡 Smart Tip</div>
        <div style={{fontSize:13,color:"#1A1814",lineHeight:1.5}}>{profile?.goal==="cutting"?`Target: ${targets.calories} kcal/day. Consistent logging for 7 days triggers auto-adjustment.`:`Aim for ${targets.protein}g protein daily to maximise muscle growth.`}</div>
      </div>
    </div>
  );
}

// ─── SMART FREE FOOD SEARCH ───────────────────────────────────────────────────
async function smartFoodSearch(query) {
  const q = query.toLowerCase().trim();

  // 1. Search extended Indian DB first (instant, no network)
  const indianMatches = INDIAN_EXTENDED.filter(f =>
    f.name.toLowerCase().includes(q) ||
    q.split(" ").some(word => word.length > 2 && f.name.toLowerCase().includes(word))
  ).slice(0, 4);

  if (indianMatches.length > 0) return { source:"local", results: indianMatches };

  // 2. Also search main FOODS array
  const mainMatches = FOODS.filter(f =>
    f.name.toLowerCase().includes(q) ||
    q.split(" ").some(word => word.length > 3 && f.name.toLowerCase().includes(word))
  ).slice(0, 4);

  if (mainMatches.length > 0) return { source:"local", results: mainMatches };

  // 3. Fall back to Open Food Facts API (free, no key needed)
  const encoded = encodeURIComponent(query);
  const url = `https://world.openfoodfacts.org/cgi/search.pl?search_terms=${encoded}&search_simple=1&action=process&json=1&page_size=6&fields=product_name,nutriments,serving_size`;

  const resp = await fetch(url);
  const data = await resp.json();

  const results = (data.products || [])
    .filter(p => p.product_name && p.nutriments?.["energy-kcal_100g"])
    .slice(0, 4)
    .map(p => ({
      name: p.product_name,
      cal:  Math.round(p.nutriments["energy-kcal_100g"]   || 0),
      p:    Math.round((p.nutriments["proteins_100g"]      || 0) * 10) / 10,
      c:    Math.round((p.nutriments["carbohydrates_100g"] || 0) * 10) / 10,
      f:    Math.round((p.nutriments["fat_100g"]           || 0) * 10) / 10,
      units: ["g"],
      note: "Open Food Facts database",
    }));

  return { source:"openfoodfacts", results };
}

                  {s.code&&<span style={{background:"#EDE8DE",borderRadius:4,padding:"1px 6px",fontFamily:"monospace",fontSize:11,color:"#1A1814",marginLeft:4}}>{s.code}</span>}
                </div>
              </div>
            </div>
          ))}
        </div>

        <div style={{marginTop:20,padding:"12px 14px",background:"#EDE8DE",borderRadius:12,fontSize:11,color:"#6B6560",lineHeight:1.6}}>
          🔒 <strong>Your key is private.</strong> It is stored only in your browser session and never shared with anyone except Anthropic's servers directly. MacroTrack Pro cannot see or store your key.
        </div>

        <button onClick={onClose} style={{...S.btn("#C17A4A"),marginTop:16}}>Got it — let me enter my key</button>
      </div>
    </div>
  );
}

    </div>
  );
}

// ─── LOG FOOD ─────────────────────────────────────────────────────────────────
function LogFood({daily,targets,onAdd,onRemove,activeDay,setActiveDay,blank}){
  const log=daily[activeDay]||blank;
  const committed=!!log.committed;
  const consumed=Object.values(log.meals).flat().reduce((a,f)=>({cal:a.cal+f.cal,p:a.p+f.p,c:a.c+f.c,fat:a.fat+f.fat}),{cal:0,p:0,c:0,fat:0});

  const [q,setQ]=useState("");
  const [qty,setQty]=useState(100);
  const [unit,setUnit]=useState("g");
  const [meal,setMeal]=useState("breakfast");
  const [sel,setSel]=useState(null);
  const [searchResults,setSearchResults]=useState([]);
  const [searchLoading,setSearchLoading]=useState(false);
  const [searchError,setSearchError]=useState("");
  const [searchSource,setSearchSource]=useState(""); // "local" | "openfoodfacts"
  const [searchMode,setSearchMode]=useState("local"); // "local" | "smart" | "photo"
  const [localRes,setLocalRes]=useState([]);
  const [photoData,setPhotoData]=useState(null);      // base64 image
  const [photoPreview,setPhotoPreview]=useState(null); // object URL for display
  const [photoLoading,setPhotoLoading]=useState(false);
  const [photoResults,setPhotoResults]=useState([]);
  const [photoError,setPhotoError]=useState("");
  const [apiKey]=useState(()=>sessionStorage.getItem("mtp_apikey")||"");
  const fileInputRef=useRef(null);
  const searchTimer=useRef(null);

  const meals=["breakfast","lunch","dinner","snacks"];

  // Local search in FOODS database (instant)
  useEffect(()=>{
    if(searchMode!=="local") return;
    if(q.length<2){setLocalRes([]);return;}
    const r=FOODS.filter(f=>f.name.toLowerCase().includes(q.toLowerCase()));
    setLocalRes(r.slice(0,6));
  },[q,searchMode]);

  const runSmartSearch=async()=>{
    if(!q.trim()||q.trim().length<2) return;
    setSearchLoading(true); setSearchError(""); setSearchResults([]); setSel(null); setSearchSource("");
    try {
      const {source, results} = await smartFoodSearch(q.trim());
      setSearchSource(source);
      if(results.length===0) setSearchError("No results found. Try different keywords (e.g. 'dal', 'sabzi', 'chicken').");
      else setSearchResults(results);
    } catch(e) {
      setSearchError("Search failed. Check your internet connection and try again.");
    }
    setSearchLoading(false);
  };

  const handlePhotoSelect=async(e)=>{
    const file=e.target.files?.[0];
    if(!file) return;
    // Show preview
    setPhotoPreview(URL.createObjectURL(file));
    setPhotoResults([]); setPhotoError("");
    // Convert to base64
    const b64=await new Promise((res,rej)=>{
      const r=new FileReader();
      r.onload=()=>res(r.result.split(",")[1]);
      r.onerror=rej;
      r.readAsDataURL(file);
    });
    setPhotoData({b64, type:file.type||"image/jpeg"});
  };

  const analyzePhoto=async()=>{
    if(!photoData) return;
    if(!apiKey){setPhotoError("API key required. Set it in the AI tab first.");return;}
    setPhotoLoading(true); setPhotoError(""); setPhotoResults([]);
    const sysPrompt = "You are a nutrition expert and food recognition AI. The user will show you a photo of food or a meal. "
      + "Identify every distinct food item visible. For each item estimate a realistic portion size and nutrition for that portion. "
      + "Respond with ONLY a raw JSON array (no markdown, no explanation) in this format: "
      + '[{"name":"Food name","portion":"e.g. 1 cup","grams":150,"cal":200,"p":8.0,"c":25.0,"f":6.0}]. '
      + "Be realistic about Indian home-cooked portions. If unclear or not food, respond with an empty array []. "
      + "Output ONLY the raw JSON array, nothing else.";
    try {
      const res=await fetch(WORKER_URL,{
        method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01"},
        body:JSON.stringify({
          model:"claude-haiku-4-5-20251001",
          max_tokens:1000,
          system:sysPrompt,
          messages:[{
            role:"user",
            content:[
              {type:"image",source:{type:"base64",media_type:photoData.type,data:photoData.b64}},
              {type:"text",text:"What foods do you see? Estimate the macros for each item in the portions shown."}
            ]
          }]
        })
      });
      const data=await res.json();
      if(data.error) throw new Error(data.error.message||"API error");
      const text=data.content?.[0]?.text||"[]";
      const clean=text.replace(/```json|```/g,"").trim();
      const results=JSON.parse(clean);
      if(!results.length) setPhotoError("Couldn't identify any food in this photo. Try a clearer shot.");
      else setPhotoResults(results);
    } catch(e){
      setPhotoError("Photo analysis failed. Check your API key and connection.");
    }
    setPhotoLoading(false);
  };

  const selectPhotoFood=(r)=>{
    // Photo results already have absolute macros (not per 100g)
    // We store them directly as a pre-calculated item
    onAdd(activeDay, meal, {
      name:r.name,
      grams:r.grams||100,
      dq:r.grams||100,
      du:"g",
      cal:r.cal, p:r.p, c:r.c, fat:r.f
    });
  };

  const clearPhoto=()=>{
    setPhotoData(null);
    setPhotoPreview(null);
    setPhotoResults([]);
    setPhotoError("");
    if(fileInputRef.current) fileInputRef.current.value="";
  };

  const selectFood=(r)=>{
    setSel(r);
    setQ(r.name);
    setLocalRes([]);
    setSearchResults([]);
    setUnit(r.units?.[0]||"g");
    setQty((r.units?.[0]==="piece"||r.units?.[0]==="scoop")?1:100);
  };

  const grams = sel ? toGrams(sel, qty, unit) : qty;
  const mac = sel ? {
    cal: +(sel.cal * grams / 100).toFixed(1),
    p:   +(sel.p   * grams / 100).toFixed(1),
    c:   +(sel.c   * grams / 100).toFixed(1),
    fat: +(sel.f   * grams / 100).toFixed(1),
  } : null;

  const doAdd=()=>{
    if(!sel||committed) return;
    onAdd(activeDay, meal, {name:sel.name, grams, dq:qty, du:unit, ...mac});
    setQ(""); setSel(null); setQty(100); setUnit("g"); setSearchResults([]); setLocalRes([]);
  };

  const clearSearch=()=>{
    setQ(""); setSel(null); setSearchResults([]);
    setLocalRes([]); setSearchError(""); clearPhoto();
  };

  // ── render ──
  return(
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <DayPicker activeKey={activeDay} onChange={k=>{setActiveDay(k);clearSearch();}}/>

      {committed&&<div style={{...S.card({background:"rgba(212,149,106,.1)",border:"1px solid rgba(251,191,36,.25)"}),textAlign:"center",fontSize:13,color:"#D4956A"}}>🔒 {keyLabel(activeDay)} committed — edits locked.</div>}

      {/* Macro progress bars */}
      <div style={S.card()}>
        <Bar label="Calories" value={consumed.cal} max={targets.calories} color="#C17A4A" unit=""/>
        <Bar label="Protein"  value={consumed.p}   max={targets.protein}  color="#6B8CAE"/>
        <Bar label="Carbs"    value={consumed.c}   max={targets.carbs}    color="#9b87c7"/>
        <Bar label="Fats"     value={consumed.fat} max={targets.fat}      color="#D4956A"/>
      </div>

      {/* Meal selector */}
      <div style={{display:"flex",gap:8,overflowX:"auto",paddingBottom:2}}>
        {meals.map(m=><button key={m} onClick={()=>setMeal(m)} style={{background:meal===m?"#C17A4A":"#EDE8DE",color:meal===m?"#fff":"#6B6560",border:"none",borderRadius:10,padding:"8px 14px",fontWeight:700,fontSize:12,cursor:"pointer",whiteSpace:"nowrap",flexShrink:0,fontFamily:"DM Sans,sans-serif"}}>{m[0].toUpperCase()+m.slice(1)}</button>)}
      </div>

      {/* Search panel */}
      {!committed&&(
        <div style={S.card()}>
          {/* Mode toggle — 3 tabs */}
          <div style={{display:"flex",background:"#EDE8DE",borderRadius:12,padding:3,marginBottom:14,gap:3}}>
            <button onClick={()=>{setSearchMode("local");setSel(null);setSearchResults([]);setSearchError("");clearPhoto();}} style={{flex:1,background:searchMode==="local"?"rgba(193,122,74,.14)":"none",color:searchMode==="local"?"#C17A4A":"#6B6560",border:`1px solid ${searchMode==="local"?"rgba(193,122,74,.25)":"transparent"}`,borderRadius:9,padding:"7px 0",fontWeight:700,fontSize:11,cursor:"pointer",fontFamily:"DM Sans,sans-serif",transition:"all .2s"}}>
              📋 Quick
            </button>
            <button onClick={()=>{setSearchMode("smart");setSel(null);setLocalRes([]);setSearchError("");clearPhoto();}} style={{flex:1,background:searchMode==="smart"?"rgba(107,140,174,.14)":"none",color:searchMode==="smart"?"#9b87c7":"#6B6560",border:`1px solid ${searchMode==="smart"?"rgba(107,140,174,.25)":"transparent"}`,borderRadius:9,padding:"7px 0",fontWeight:700,fontSize:11,cursor:"pointer",fontFamily:"DM Sans,sans-serif",transition:"all .2s"}}>
              🔍 Smart
            </button>
            <button onClick={()=>{setSearchMode("photo");setSel(null);setLocalRes([]);setSearchResults([]);setSearchError("");}} style={{flex:1,background:searchMode==="photo"?"rgba(122,158,126,.18)":"none",color:searchMode==="photo"?"#7A9E7E":"#6B6560",border:`1px solid ${searchMode==="photo"?"#7A9E7E":"transparent"}`,borderRadius:9,padding:"7px 0",fontWeight:700,fontSize:11,cursor:"pointer",fontFamily:"DM Sans,sans-serif",transition:"all .2s"}}>
              📷 Photo
            </button>
          </div>

          {/* Search bar — hidden in photo mode */}
          {searchMode!=="photo"&&(
          <div style={{display:"flex",gap:8,marginBottom:10}}>
            <input
              style={{...S.inp,flex:1}}
              value={q}
              onChange={e=>{setQ(e.target.value);setSel(null);if(searchMode==="smart"){setSearchResults([]);setSearchError("");}}}
              onKeyDown={e=>{if(e.key==="Enter"&&searchMode==="smart") runSmartSearch();}}
              placeholder={searchMode==="local"?"🔍 Search database (e.g. roti, oats, chicken)":"🔍 Type any food (e.g. cabbage sabzi, dal makhni)"}
            />
            {q&&<button onClick={clearSearch} style={{background:"#DDD6CC",border:"none",borderRadius:10,color:"#6B6560",padding:"0 12px",cursor:"pointer",fontSize:16,fontFamily:"DM Sans,sans-serif"}}>✕</button>}
          </div>
          )}

          {/* Smart search button */}
          {searchMode==="smart"&&(
            <button
              onClick={runSmartSearch}
              disabled={searchLoading||!q.trim()}
              style={{...S.btn("#9b87c7"),marginBottom:12,opacity:(!q.trim()||searchLoading)?.5:1,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
              {searchLoading&&<div className="spin" style={{width:14,height:14,border:"2px solid rgba(255,255,255,.3)",borderTop:"2px solid #fff",borderRadius:"50%"}}/>}
              {searchLoading?"Searching...":"🔍 Search Food"}
            </button>
          )}

          {/* ── PHOTO MODE UI ── */}
          {searchMode==="photo"&&(
            <div>
              {/* Hidden file input */}
              <input ref={fileInputRef} type="file" accept="image/*" capture="environment"
                style={{display:"none"}} onChange={handlePhotoSelect}/>

              {/* No photo yet — upload prompt */}
              {!photoPreview&&(
                <div style={{textAlign:"center",padding:"8px 0 16px"}}>
                  <div style={{fontSize:36,marginBottom:10}}>📷</div>
                  <div style={{fontFamily:"'Fraunces',Georgia,serif",fontSize:16,fontWeight:600,color:"#1A1814",marginBottom:6}}>
                    Scan your meal
                  </div>
                  <div style={{fontSize:12,color:"#A8A09A",marginBottom:18,lineHeight:1.6}}>
                    Take a photo or upload one — AI will identify the foods and estimate the macros for each item.
                  </div>
                  <div style={{display:"flex",gap:10,justifyContent:"center"}}>
                    <button onClick={()=>{if(fileInputRef.current){fileInputRef.current.setAttribute("capture","environment");fileInputRef.current.click();}}}
                      style={{...S.btn("#7A9E7E",{width:"auto",padding:"11px 20px",borderRadius:12,display:"flex",alignItems:"center",gap:7})}}>
                      📷 Take Photo
                    </button>
                    <button onClick={()=>{if(fileInputRef.current){fileInputRef.current.removeAttribute("capture");fileInputRef.current.click();}}}
                      style={{...S.btn("#EDE8DE",{color:"#6B6560",border:"1px solid #DDD6CC",width:"auto",padding:"11px 20px",borderRadius:12})}}>
                      🖼 Upload
                    </button>
                  </div>
                  {!apiKey&&(
                    <div style={{marginTop:14,background:"#fef9f4",border:"1px solid rgba(193,122,74,.2)",borderRadius:12,padding:"12px 14px",textAlign:"left"}}>
                      <div style={{fontSize:11,fontWeight:700,color:"#C17A4A",marginBottom:6,letterSpacing:".06em",textTransform:"uppercase"}}>🔑 API Key Required</div>
                      <div style={{fontSize:11,color:"#6B6560",marginBottom:8,lineHeight:1.5}}>Enter your Anthropic API key to use photo scan. Get one free at <span style={{color:"#C17A4A",fontWeight:600}}>console.anthropic.com</span></div>
                      <PhotoApiKeyEntry onSave={k=>{sessionStorage.setItem("mtp_apikey",k);window.location.reload();}}/>
                    </div>
                  )}
                </div>
              )}

              {/* Photo preview */}
              {photoPreview&&(
                <div>
                  <div style={{position:"relative",marginBottom:12}}>
                    <img src={photoPreview} alt="meal"
                      style={{width:"100%",borderRadius:14,maxHeight:220,objectFit:"cover",display:"block"}}/>
                    <button onClick={clearPhoto}
                      style={{position:"absolute",top:8,right:8,background:"rgba(26,24,20,.6)",border:"none",borderRadius:8,color:"#fff",width:30,height:30,cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
                  </div>

                  {/* Analyse button */}
                  {!photoResults.length&&!photoLoading&&(
                    <button onClick={analyzePhoto} disabled={!apiKey}
                      style={{...S.btn("#7A9E7E",{marginBottom:10,display:"flex",alignItems:"center",justifyContent:"center",gap:8,opacity:!apiKey?.5:1})}}>
                      ✨ Identify Foods & Estimate Macros
                    </button>
                  )}

                  {/* Loading */}
                  {photoLoading&&(
                    <div style={{display:"flex",alignItems:"center",gap:10,padding:"12px 0",justifyContent:"center"}}>
                      <div className="spin" style={{width:16,height:16,border:"2px solid #DDD6CC",borderTop:"2px solid #7A9E7E",borderRadius:"50%"}}/>
                      <span style={{fontSize:13,color:"#6B6560"}}>Analysing your meal...</span>
                    </div>
                  )}

                  {/* Error */}
                  {photoError&&(
                    <div style={{background:"#fef0ec",border:"1px solid #f5c4b8",borderRadius:10,padding:"9px 12px",marginBottom:10,fontSize:13,color:"#C0614A"}}>
                      {photoError}
                    </div>
                  )}

                  {/* Results */}
                  {photoResults.length>0&&(
                    <div>
                      <div style={{fontSize:11,fontWeight:700,color:"#7A9E7E",letterSpacing:".07em",textTransform:"uppercase",marginBottom:8}}>
                        📷 Detected Foods — tap to log
                      </div>
                      <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:10}}>
                        {photoResults.map((r,i)=>(
                          <div key={i} onClick={()=>selectPhotoFood(r)}
                            style={{padding:"11px 13px",borderRadius:12,background:"rgba(122,158,126,.08)",border:"1px solid rgba(122,158,126,.25)",cursor:"pointer"}}>
                            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:4}}>
                              <div style={{fontWeight:700,fontSize:13,color:"#1A1814"}}>{r.name}</div>
                              <span style={{color:"#7A9E7E",fontWeight:800,fontSize:13,whiteSpace:"nowrap",marginLeft:8}}>{r.cal} kcal</span>
                            </div>
                            <div style={{display:"flex",gap:10,fontSize:11,color:"#A8A09A"}}>
                              <span>P: {r.p}g</span><span>C: {r.c}g</span><span>F: {r.f}g</span>
                              <span style={{color:"#A8A09A",fontStyle:"italic"}}>{r.portion}</span>
                            </div>
                          </div>
                        ))}
                      </div>
                      <div style={{fontSize:10,color:"#A8A09A",textAlign:"center",marginBottom:8}}>
                        AI estimates — values are approximate. Tap each item to log it to {meal}.
                      </div>
                      <button onClick={clearPhoto}
                        style={{...S.btn("#EDE8DE",{color:"#6B6560",border:"1px solid #DDD6CC",fontSize:12,padding:"8px"})}}>
                        📷 Scan another photo
                      </button>
                    </div>
                  )}
                </div>
              )}
            </div>
          )}

          {/* Smart search hint */}
          {searchMode==="smart"&&!searchLoading&&searchResults.length===0&&!searchError&&!sel&&(
            <div style={{background:"rgba(107,140,174,.07)",border:"1px solid rgba(167,139,250,.2)",borderRadius:12,padding:"10px 14px",marginBottom:12,fontSize:12,color:"#6B6560",lineHeight:1.7}}>
              <div style={{color:"#9b87c7",fontWeight:700,marginBottom:4}}>🔍 Smart Search</div>
              Searches our Indian food database first, then Open Food Facts (millions of foods worldwide).<br/>
              <span style={{color:"#A8A09A"}}>Try: "cabbage sabzi", "dal makhni", "aloo gobi", "banana milkshake"</span>
            </div>
          )}

          {/* Error */}
          {searchError&&<div style={{background:"rgba(192,97,74,.07)",border:"1px solid rgba(239,68,68,.25)",borderRadius:10,padding:"9px 12px",marginBottom:10,fontSize:13,color:"#e8a090"}}>{searchError}</div>}

          {/* Local quick search results */}
          {searchMode==="local"&&localRes.length>0&&!sel&&(
            <div style={{display:"flex",flexDirection:"column",gap:5,marginBottom:10,maxHeight:240,overflowY:"auto"}}>
              {localRes.map((r,i)=>(
                <div key={i} onClick={()=>selectFood(r)}
                  style={{padding:"9px 12px",borderRadius:10,background:"#EDE8DE",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div>
                    <div style={{fontWeight:600,fontSize:13}}>{r.name}</div>
                    <div style={{fontSize:10,color:"#A8A09A",marginTop:1}}>{r.cat||"Indian Foods"}</div>
                  </div>
                  <span style={{color:"#6B6560",fontSize:12}}>{r.cal} kcal/100g</span>
                </div>
              ))}
              <div onClick={()=>setSearchMode("smart")} style={{padding:"9px 12px",borderRadius:10,background:"rgba(107,140,174,.07)",border:"1px solid rgba(167,139,250,.2)",cursor:"pointer",textAlign:"center",fontSize:12,color:"#9b87c7",fontWeight:700}}>
                🔍 Not finding it? Try Smart Search
              </div>
            </div>
          )}

          {/* Local — no results nudge */}
          {searchMode==="local"&&q.length>=2&&localRes.length===0&&!sel&&(
            <div style={{marginBottom:10}}>
              <div style={{fontSize:13,color:"#A8A09A",textAlign:"center",padding:"8px 0",marginBottom:8}}>No match in quick database.</div>
              <div onClick={()=>setSearchMode("smart")} style={{padding:"10px 14px",borderRadius:10,background:"rgba(107,140,174,.1)",border:"1px solid rgba(167,139,250,.25)",cursor:"pointer",textAlign:"center",fontSize:13,color:"#9b87c7",fontWeight:700}}>
                🔍 Search "{q}" in Smart Search
              </div>
            </div>
          )}

          {/* Smart search results */}
          {searchResults.length>0&&!sel&&(
            <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:10}}>
              <div style={{fontSize:11,color:"#9b87c7",fontWeight:700,letterSpacing:".07em",textTransform:"uppercase",marginBottom:2}}>
                {searchSource==="local"?"📋 Matched in database — tap to select":"🌐 Open Food Facts results — tap to select"}
              </div>
              {searchResults.map((r,i)=>(
                <div key={i} onClick={()=>selectFood(r)}
                  style={{padding:"11px 13px",borderRadius:12,background:"rgba(107,140,174,.07)",border:"1px solid rgba(167,139,250,.2)",cursor:"pointer"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:4}}>
                    <div style={{fontWeight:700,fontSize:13,color:"#fff",flex:1,marginRight:8}}>{r.name}</div>
                    <span style={{color:"#9b87c7",fontWeight:800,fontSize:13,whiteSpace:"nowrap"}}>{r.cal} kcal</span>
                  </div>
                  <div style={{display:"flex",gap:10,fontSize:11,color:"#6B6560"}}>
                    <span>P: {r.p}g</span><span>C: {r.c}g</span><span>F: {r.f}g</span>
                    <span style={{color:"#A8A09A"}}>per 100g</span>
                  </div>
                  {r.note&&<div style={{fontSize:10,color:"#A8A09A",marginTop:3,fontStyle:"italic"}}>{r.note}</div>}
                </div>
              ))}
              {searchSource==="openfoodfacts"&&<div style={{fontSize:10,color:"#A8A09A",textAlign:"center",marginTop:2}}>Source: Open Food Facts — values are approximate</div>}
            </div>
          )}

          {/* Selected food preview */}
          {sel&&(
            <div style={{background:"rgba(193,122,74,.07)",border:"1px solid rgba(110,231,183,.2)",borderRadius:12,padding:12,marginBottom:12}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                <div style={{fontWeight:700,fontSize:14,color:"#C17A4A"}}>{sel.name}</div>
                <button onClick={clearSearch} style={{background:"none",border:"none",color:"#6B6560",cursor:"pointer",fontSize:13,fontFamily:"DM Sans,sans-serif"}}>Change ✕</button>
              </div>
              <div style={{display:"flex",gap:10,flexWrap:"wrap",fontSize:12,color:"#6B6560"}}>
                <span>P: {Math.round(mac?.p)}g</span>
                <span>C: {Math.round(mac?.c)}g</span>
                <span>F: {Math.round(mac?.fat)}g</span>
                <span style={{color:"#C17A4A",fontWeight:700}}>🔥 {Math.round(mac?.cal)} kcal</span>
                <span style={{color:"#A8A09A"}}>≈{Math.round(grams)}g total</span>
              </div>
            </div>
          )}

          {/* Quantity + unit + add — hidden in photo mode */}
          {searchMode!=="photo"&&(
          <div style={{display:"flex",gap:10,alignItems:"flex-end"}}>
            <div style={{flex:1}}>
              <label style={S.lbl}>Quantity</label>
              <input style={S.inp} type="number" value={qty===0?"":qty}
                onChange={e=>setQty(e.target.value===""?0:+e.target.value)}
                placeholder="100"/>
            </div>
            <div style={{flex:1}}>
              <label style={S.lbl}>Unit</label>
              <select style={S.sel} value={unit} onChange={e=>setUnit(e.target.value)}>
                {(sel?.units||["g"]).map(u=><option key={u} value={u}>{u}</option>)}
              </select>
            </div>
            <button onClick={doAdd} disabled={!sel} style={{...S.btn(),flex:"0 0 76px",padding:"11px 0",opacity:sel?1:.4}}>Add</button>
          </div>
          )}
        </div>
      )}

      {/* Logged meals */}
      {meals.map(m=>(
        <div key={m} style={S.card()}>
          <div style={{fontSize:12,fontWeight:700,color:"#6B6560",textTransform:"capitalize",letterSpacing:".08em",marginBottom:10}}>
            {m} · {Math.round(log.meals[m].reduce((a,f)=>a+f.cal,0))} kcal
          </div>
          {log.meals[m].length===0
            ?<div style={{fontSize:12,color:"#A8A09A",textAlign:"center",padding:"6px 0"}}>Empty</div>
            :log.meals[m].map((fd,i)=>(
              <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 0",borderBottom:"1px solid rgba(255,255,255,.05)"}}>
                <div>
                  <div style={{fontSize:13,fontWeight:600}}>{fd.name}</div>
                  <div style={{fontSize:11,color:"#6B6560"}}>{fd.dq}{fd.du} · P:{Math.round(fd.p)}g C:{Math.round(fd.c)}g F:{Math.round(fd.fat)}g</div>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <span style={{color:"#C17A4A",fontWeight:700,fontSize:13}}>{Math.round(fd.cal)}</span>
                  {!committed&&<button onClick={()=>onRemove(activeDay,m,i)} style={{background:"rgba(192,97,74,.1)",border:"none",borderRadius:8,color:"#C0614A",padding:"4px 9px",cursor:"pointer",fontSize:12,fontFamily:"DM Sans,sans-serif"}}>✕</button>}
                </div>
              </div>
            ))
          }
        </div>
      ))}
    </div>
  );
}

// ─── TRAINING ─────────────────────────────────────────────────────────────────
function Training({daily,onAddEx,onRemoveEx,activeDay,setActiveDay,blank}){
  const log=daily[activeDay]||blank;
  const committed=!!log.committed;
  const [muscSel,setMuscSel]=useState(null);   // selected muscle group id
  const [exSel,setExSel]=useState(null);        // selected exercise
  const [sets,setSets]=useState(3);
  const [reps,setReps]=useState(10);
  const [searchQ,setSearchQ]=useState("");
  const totalBurned=(log.exercises||[]).reduce((a,e)=>a+(e.burned||0),0);
  const totalSets=(log.exercises||[]).reduce((a,e)=>a+(e.sets||0),0);

  const activeMG = MUSCLE_GROUPS.find(g=>g.id===muscSel);
  const activeColor = activeMG?.color||"#C17A4A";

  // Search across all exercises
  const searchResults = searchQ.length>1
    ? MUSCLE_GROUPS.flatMap(g=>g.exercises.map(e=>({...e,group:g.label,color:g.color,gid:g.id}))).filter(e=>e.name.toLowerCase().includes(searchQ.toLowerCase())).slice(0,8)
    : [];

  const calBurned = exSel ? avgCal(exSel) * sets : 0;

  const doAdd=()=>{
    if(!exSel||committed) return;
    onAddEx(activeDay,{
      name: exSel.name,
      group: activeMG?.label || exSel.group,
      sets, reps,
      burned: calBurned,
    });
    setExSel(null); setSets(3); setReps(10);
  };

  return(
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <DayPicker activeKey={activeDay} onChange={k=>{setActiveDay(k);setExSel(null);setMuscSel(null);setSearchQ("");}}/>

      {committed&&<div style={{...S.card({background:"rgba(212,149,106,.1)",border:"1px solid rgba(251,191,36,.25)"}),textAlign:"center",fontSize:13,color:"#D4956A"}}>🔒 {keyLabel(activeDay)} committed — edits locked.</div>}

      {/* Today's workout summary */}
      {(log.exercises||[]).length>0&&(
        <div style={{...S.card({background:"rgba(212,149,106,.08)",border:"1px solid rgba(251,191,36,.2)"})}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <div style={{fontSize:12,fontWeight:700,color:"#D4956A",letterSpacing:".08em",textTransform:"uppercase"}}>Today's Workout</div>
            <div style={{display:"flex",gap:12,fontSize:12}}>
              <span style={{color:"#6B6560"}}>{totalSets} sets</span>
              <span style={{color:"#D4956A",fontWeight:700}}>🔥 {Math.round(totalBurned)} kcal</span>
            </div>
          </div>
          {log.exercises.map((e,i)=>(
            <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid rgba(255,255,255,.05)"}}>
              <div>
                <div style={{fontSize:13,fontWeight:600}}>{e.name}</div>
                <div style={{fontSize:11,color:"#A8A09A"}}>{e.group} · {e.sets} sets × {e.reps} reps</div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{color:"#D4956A",fontWeight:700,fontSize:13}}>🔥{Math.round(e.burned)}</span>
                {!committed&&<button onClick={()=>onRemoveEx(activeDay,i)} style={{background:"rgba(192,97,74,.1)",border:"none",borderRadius:8,color:"#C0614A",padding:"4px 9px",cursor:"pointer",fontSize:12,fontFamily:"DM Sans,sans-serif"}}>✕</button>}
              </div>
            </div>
          ))}
        </div>
      )}

      {/* Add exercise panel */}
      {!committed&&(
        <div style={S.card()}>
          <div style={{fontSize:12,fontWeight:700,color:"#6B6560",letterSpacing:".08em",textTransform:"uppercase",marginBottom:14}}>Add Exercise</div>

          {/* Search bar */}
          <input
            style={{...S.inp,marginBottom:12}}
            value={searchQ}
            onChange={e=>{setSearchQ(e.target.value);setExSel(null);setMuscSel(null);}}
            placeholder="🔍 Search any exercise..."
          />

          {/* Search results */}
          {searchQ.length>1&&(
            <div style={{display:"flex",flexDirection:"column",gap:5,marginBottom:12,maxHeight:220,overflowY:"auto"}}>
              {searchResults.length===0
                ?<div style={{fontSize:13,color:"#A8A09A",textAlign:"center",padding:"8px 0"}}>No exercises found</div>
                :searchResults.map((e,i)=>(
                  <div key={i} onClick={()=>{setExSel(e);setMuscSel(e.gid);setSearchQ("");}}
                    style={{padding:"9px 12px",borderRadius:10,background:exSel?.name===e.name?`${e.color}22`:"#EDE8DE",border:`1px solid ${exSel?.name===e.name?e.color:"transparent"}`,cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div>
                      <div style={{fontWeight:600,fontSize:13}}>{e.name}</div>
                      <div style={{fontSize:10,color:"#A8A09A",marginTop:1}}>{e.group}</div>
                    </div>
                    <span style={{color:e.color,fontSize:11,fontWeight:700}}>{e.calPerSet[0]}–{e.calPerSet[1]} kcal/set</span>
                  </div>
                ))
              }
            </div>
          )}

          {/* Muscle group grid */}
          {!searchQ&&(
            <>
              <div style={{fontSize:11,color:"#A8A09A",fontWeight:700,letterSpacing:".07em",textTransform:"uppercase",marginBottom:8}}>Select Muscle Group</div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:7,marginBottom:14}}>
                {MUSCLE_GROUPS.map(g=>(
                  <button key={g.id} onClick={()=>{setMuscSel(muscSel===g.id?null:g.id);setExSel(null);}}
                    style={{background:muscSel===g.id?`${g.color}22`:"#EDE8DE",border:`2px solid ${muscSel===g.id?g.color:"#DDD6CC"}`,borderRadius:12,padding:"10px 6px",cursor:"pointer",textAlign:"center",transition:"all .15s",fontFamily:"DM Sans,sans-serif"}}>
                    <div style={{fontSize:18,marginBottom:3}}>{g.icon}</div>
                    <div style={{fontSize:10,fontWeight:700,color:muscSel===g.id?g.color:"#6B6560",letterSpacing:".04em"}}>{g.label}</div>
                  </button>
                ))}
              </div>
            </>
          )}

          {/* Exercise list for selected muscle group */}
          {muscSel&&!searchQ&&(
            <div style={{marginBottom:12}}>
              <div style={{fontSize:11,color:activeColor,fontWeight:700,letterSpacing:".07em",textTransform:"uppercase",marginBottom:8}}>
                {activeMG?.icon} {activeMG?.label} Exercises
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:5,maxHeight:240,overflowY:"auto"}}>
                {activeMG?.exercises.map((e,i)=>(
                  <div key={i} onClick={()=>setExSel(exSel?.name===e.name?null:e)}
                    style={{padding:"10px 13px",borderRadius:11,background:exSel?.name===e.name?`${activeColor}18`:"#EDE8DE",border:`2px solid ${exSel?.name===e.name?activeColor:"#EDE8DE"}`,cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center",transition:"all .15s"}}>
                    <div style={{fontWeight:600,fontSize:13,color:exSel?.name===e.name?activeColor:"#fff"}}>{e.name}</div>
                    <span style={{fontSize:11,color:exSel?.name===e.name?activeColor:"#A8A09A",fontWeight:700}}>{e.calPerSet[0]}–{e.calPerSet[1]} kcal/set</span>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* Sets & Reps + Add */}
          {exSel&&(
            <>
              <div style={{background:`${activeColor}12`,border:`1px solid ${activeColor}33`,borderRadius:12,padding:12,marginBottom:12}}>
                <div style={{fontWeight:700,fontSize:14,color:activeColor,marginBottom:4}}>{exSel.name}</div>
                <div style={{fontSize:12,color:"#6B6560"}}>
                  {sets} sets × {reps} reps → <span style={{color:"#D4956A",fontWeight:700}}>🔥 ~{calBurned} kcal</span>
                </div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
                <div>
                  <label style={S.lbl}>Sets</label>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <button onClick={()=>setSets(s=>Math.max(1,s-1))} style={{background:"#DDD6CC",border:"none",borderRadius:8,color:"#fff",width:34,height:40,cursor:"pointer",fontSize:18,fontFamily:"DM Sans,sans-serif"}}>−</button>
                    <div style={{flex:1,textAlign:"center",fontSize:20,fontWeight:900,color:"#fff"}}>{sets}</div>
                    <button onClick={()=>setSets(s=>Math.min(20,s+1))} style={{background:"#DDD6CC",border:"none",borderRadius:8,color:"#fff",width:34,height:40,cursor:"pointer",fontSize:18,fontFamily:"DM Sans,sans-serif"}}>+</button>
                  </div>
                </div>
                <div>
                  <label style={S.lbl}>Reps</label>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <button onClick={()=>setReps(r=>Math.max(1,r-1))} style={{background:"#DDD6CC",border:"none",borderRadius:8,color:"#fff",width:34,height:40,cursor:"pointer",fontSize:18,fontFamily:"DM Sans,sans-serif"}}>−</button>
                    <div style={{flex:1,textAlign:"center",fontSize:20,fontWeight:900,color:"#fff"}}>{reps}</div>
                    <button onClick={()=>setReps(r=>Math.min(100,r+1))} style={{background:"#DDD6CC",border:"none",borderRadius:8,color:"#fff",width:34,height:40,cursor:"pointer",fontSize:18,fontFamily:"DM Sans,sans-serif"}}>+</button>
                  </div>
                </div>
              </div>
              <button onClick={doAdd} style={{...S.btn("#D4956A"),display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
                Log Exercise 🔥
              </button>
            </>
          )}
        </div>
      )}

      {/* This week tracker */}
      <div style={S.card()}>
        <div style={{fontSize:12,fontWeight:700,color:"#6B6560",letterSpacing:".08em",textTransform:"uppercase",marginBottom:12}}>This Week</div>
        <div style={{display:"flex",gap:6}}>
          {["M","T","W","T","F","S","S"].map((d,i)=>{
            const a=i<(new Date().getDay()||7);
            return(
              <div key={i} style={{flex:1,textAlign:"center"}}>
                <div style={{fontSize:10,color:"#A8A09A",marginBottom:6}}>{d}</div>
                <div style={{height:34,borderRadius:8,background:a?"rgba(212,149,106,.15)":"#EDE8DE",border:a?"1px solid rgba(212,149,106,.3)":"none"}}/>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ─── PROGRESS ─────────────────────────────────────────────────────────────────
function Progress({last7,profile,targets,daily,onWeightEntry,activeDay,setActiveDay,blank}){
  const log=daily[activeDay]||blank;
  const committed=!!log.committed;
  const [inp,setInp]=useState(log.weight||"");
  useEffect(()=>setInp(log.weight||""),[activeDay,log.weight]);
  const ws=last7.filter(d=>d.weight).map(d=>d.weight);
  const avg=ws.length?(ws.reduce((a,b)=>a+b,0)/ws.length).toFixed(1):null;
  const wkChg=ws.length>=2?(ws[ws.length-1]-ws[0]).toFixed(1):null;
  let tip=null;
  if(profile?.goal==="cutting"&&wkChg!==null){
    const v=parseFloat(wkChg);
    if(v>-0.3&&v<=0) tip={t:"📉 Loss Too Slow",m:"Consider reducing calories by 150 kcal this week.",c:"#D4956A"};
    else if(v<-1)    tip={t:"⚠️ Losing Too Fast",m:"Increase calories slightly to preserve lean muscle.",c:"#D4956A"};
    else             tip={t:"✅ On Track!",m:"Great fat loss rate. Keep it consistent.",c:"#C17A4A"};
  }
  return(
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <DayPicker activeKey={activeDay} onChange={setActiveDay}/>
      <div style={S.card()}>
        <label style={S.lbl}>Weight for {keyLabel(activeDay)} (kg)</label>
        <div style={{display:"flex",gap:10}}>
          <input style={{...S.inp,flex:1}} type="number" step="0.1" value={inp} onChange={e=>setInp(e.target.value)} placeholder="e.g. 79.5" disabled={committed}/>
          <button onClick={()=>{if(inp&&!committed)onWeightEntry(activeDay,inp);}} disabled={committed} style={{...S.btn(),flex:"0 0 88px",padding:"11px 10px",opacity:committed?.4:1}}>Save</button>
        </div>
        {committed&&<div style={{fontSize:11,color:"#D4956A",marginTop:8}}>🔒 Committed — weight locked.</div>}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        {[{l:"Current",v:log.weight||avg||"—",c:"#C17A4A"},{l:"Target",v:profile?.targetWeight||"—",c:"#6B8CAE"},{l:"7-Day Avg",v:avg||"—",c:"#fff"},{l:"Weekly Δ",v:wkChg!==null?`${wkChg>0?"+":""}${wkChg}`:"—",c:wkChg<0?"#C17A4A":"#D4956A"}].map(s=>(
          <div key={s.l} style={{...S.card(),textAlign:"center"}}><div style={{fontSize:10,color:"#6B6560",letterSpacing:".08em",textTransform:"uppercase",marginBottom:4}}>{s.l}</div><div style={{fontSize:28,fontWeight:900,color:s.c,letterSpacing:"-.03em"}}>{s.v}</div><div style={{fontSize:10,color:"#A8A09A"}}>kg</div></div>
        ))}
      </div>
      <div style={S.card()}><div style={{fontSize:12,fontWeight:700,color:"#6B6560",letterSpacing:".08em",textTransform:"uppercase",marginBottom:12}}>Weight Trend</div><WtChart data={last7}/></div>
      {tip&&<div style={{...S.card({background:`${tip.c}18`,border:`1px solid ${tip.c}30`})}}><div style={{fontSize:11,color:tip.c,fontWeight:700,letterSpacing:".08em",textTransform:"uppercase",marginBottom:6}}>{tip.t}</div><div style={{fontSize:13,color:"#1A1814"}}>{tip.m}</div></div>}
      {targets&&(<div style={S.card()}>
        <div style={{fontSize:12,fontWeight:700,color:"#6B6560",letterSpacing:".08em",textTransform:"uppercase",marginBottom:12}}>Daily Targets</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          {[{l:"Calories",v:targets.calories,u:"kcal",c:"#C17A4A"},{l:"Protein",v:targets.protein,u:"g",c:"#6B8CAE"},{l:"Carbs",v:targets.carbs,u:"g",c:"#9b87c7"},{l:"Fats",v:targets.fat,u:"g",c:"#D4956A"}].map(t=>(
            <div key={t.l} style={{background:"#EDE8DE",borderRadius:12,padding:"12px 14px"}}><div style={{fontSize:10,color:"#6B6560",textTransform:"uppercase",letterSpacing:".08em"}}>{t.l}</div><div style={{fontSize:22,fontWeight:900,color:t.c}}>{t.v}</div><div style={{fontSize:10,color:"#A8A09A"}}>{t.u}/day</div></div>
          ))}
        </div>
      </div>)}
    </div>
  );
}

// ─── PROFILE ──────────────────────────────────────────────────────────────────
function Profile({profile,targets,onUpdate,onSignOut}){
  const [f,setF]=useState(profile||{});
  const up=(k,v)=>setF(x=>({...x,[k]:v}));
  const [saved,setSaved]=useState(false);
  const [saving,setSaving]=useState(false);
  const save=async()=>{setSaving(true);await onUpdate(f);setSaving(false);setSaved(true);setTimeout(()=>setSaved(false),2000);};
  const bmr=f.age?Math.round(calcBMR(f)):null;
  const tdee=bmr?Math.round(calcTDEE(bmr,f.activity)):null;
  return(
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      {targets&&(<div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>{[{l:"BMR",v:bmr,u:"kcal"},{l:"TDEE",v:tdee,u:"kcal"},{l:"Target",v:targets.calories,u:"kcal"}].map(s=>(<div key={s.l} style={{...S.card(),textAlign:"center",padding:"14px 8px"}}><div style={{fontSize:10,color:"#6B6560",letterSpacing:".1em",textTransform:"uppercase"}}>{s.l}</div><div style={{fontSize:18,fontWeight:900,color:"#C17A4A"}}>{s.v}</div><div style={{fontSize:10,color:"#A8A09A"}}>{s.u}</div></div>))}</div>)}
      <div style={S.card()}>
        <div style={{fontSize:12,fontWeight:700,color:"#6B6560",letterSpacing:".08em",textTransform:"uppercase",marginBottom:16}}>Edit Profile</div>
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          <div><label style={S.lbl}>Name</label><input style={S.inp} value={f.name||""} onChange={e=>up("name",e.target.value)}/></div>
          <div style={{display:"flex",gap:12}}>
            <div style={{flex:1}}><label style={S.lbl}>Age</label><input style={S.inp} type="number" value={f.age||""} onChange={e=>up("age",+e.target.value)}/></div>
            <div style={{flex:1}}><label style={S.lbl}>Gender</label><select style={S.sel} value={f.gender} onChange={e=>up("gender",e.target.value)}><option value="male">Male</option><option value="female">Female</option></select></div>
          </div>
          <div style={{display:"flex",gap:12}}>
            <div style={{flex:1}}><label style={S.lbl}>Height (cm)</label><input style={S.inp} type="number" value={f.height||""} onChange={e=>up("height",+e.target.value)}/></div>
            <div style={{flex:1}}><label style={S.lbl}>Weight (kg)</label><input style={S.inp} type="number" value={f.weight||""} onChange={e=>up("weight",+e.target.value)}/></div>
          </div>
          <div><label style={S.lbl}>Target Weight (kg)</label><input style={S.inp} type="number" value={f.targetWeight||""} onChange={e=>up("targetWeight",+e.target.value)}/></div>
          <div><label style={S.lbl}>Goal</label><select style={S.sel} value={f.goal} onChange={e=>up("goal",e.target.value)}><option value="cutting">Cutting</option><option value="maintenance">Maintenance</option><option value="bulking">Lean Bulk</option></select></div>
          <div><label style={S.lbl}>Activity Level</label><select style={S.sel} value={f.activity} onChange={e=>up("activity",e.target.value)}><option value="sedentary">Sedentary</option><option value="lightly">Lightly Active</option><option value="moderately">Moderately Active</option><option value="very">Very Active</option></select></div>
          <button onClick={save} disabled={saving} style={S.btn(saved?"#7A9E7E":"#C17A4A")}>{saving?"Saving...":(saved?"✓ Saved!":"Save Changes")}</button>
        </div>
      </div>
      <div style={{...S.card(),fontSize:12,color:"#6B6560",lineHeight:1.8}}>
        <div style={{fontWeight:700,color:"#6B6560",marginBottom:6}}>How Targets Are Calculated</div>
        <div>BMR (Mifflin-St Jeor) → TDEE × activity → Goal + timeline adjustment</div>
        <div style={{marginTop:4,color:"#A8A09A"}}>
          {f.goal==="cutting"    &&"Cutting: deficit from (kg to lose × 7700 kcal) ÷ (weeks × 7) · 2.2g protein/kg"}
          {f.goal==="bulking"    &&"Bulking: surplus from (kg to gain × 7700 kcal) ÷ (weeks × 7) · 2.0g protein/kg"}
          {f.goal==="maintenance"&&"Maintenance: TDEE · 1.8g protein/kg · 28% fat · remaining carbs"}
        </div>
      </div>
      {/* Sign Out */}
      <button onClick={onSignOut} style={{...S.btn("rgba(192,97,74,.1)",{color:"#C0614A",border:"1px solid rgba(239,68,68,.2)"})}}>
        Sign Out
      </button>
    </div>
  );
}

// ─── FIREBASE SYNC HOOK ───────────────────────────────────────────────────────
function useFirebaseData(uid){
  const [profile,setProfile]=useState(null);
  const [targets,setTargets]=useState(null);
  const [daily,setDaily]=useState({});
  const [loaded,setLoaded]=useState(false);
  const { db, doc, getDoc, setDoc, updateDoc, onSnapshot, collection } = getFirebase();

  useEffect(()=>{
    if(!uid) return;

    // Listen to profile
    const profRef = doc(db,"users",uid);
    const unsub1 = onSnapshot(profRef, snap=>{
      if(snap.exists()){
        const data = snap.data();
        if(data.profile) setProfile(data.profile);
        if(data.targets) setTargets(data.targets);
      }
      setLoaded(true);
    });

    // Listen to daily logs (last 30 days)
    const logsRef = doc(db,"users",uid,"data","daily");
    const unsub2 = onSnapshot(logsRef, snap=>{
      if(snap.exists()) setDaily(snap.data());
    });

    return ()=>{ unsub1(); unsub2(); };
  },[uid]);

  const saveProfile = async(p, t)=>{
    const { db, doc, setDoc } = getFirebase();
    await setDoc(doc(db,"users",uid),{ profile:p, targets:t, onboarded:true }, {merge:true});
    setProfile(p); setTargets(t);
  };

  const saveDaily = async(newDaily)=>{
    const { db, doc, setDoc } = getFirebase();
    await setDoc(doc(db,"users",uid,"data","daily"), newDaily, {merge:false});
  };

  return { profile, targets, daily, setDaily, loaded, saveProfile, saveDaily };
}

async function callAI(messages, mode, apiKey) {
  const res = await fetch(WORKER_URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": apiKey,
      "anthropic-version": "2023-06-01",
    },
    body: JSON.stringify({
      model: "claude-haiku-4-5-20251001",
      max_tokens: 1024,
      system: CHAT_MODES[mode].system,
      messages,
    }),
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message || "API error");
  return data.content?.[0]?.text || "";
}

// Simple markdown renderer for bold and bullet points
function MdText({ text }) {
  const lines = text.split("\n");
  return (
    <div style={{fontSize:13,lineHeight:1.7,color:"#1A1814"}}>
      {lines.map((line, i) => {
        // Bold **text**
        const parts = line.split(/\*\*([^*]+)\*\*/g);
        const rendered = parts.map((p, j) =>
          j % 2 === 1 ? <strong key={j}>{p}</strong> : p
        );
        const isBullet = line.trim().startsWith("- ") || line.trim().startsWith("• ");
        const isNumbered = /^\d+\./.test(line.trim());
        if (isBullet) {
          return <div key={i} style={{display:"flex",gap:8,marginBottom:3}}>
            <span style={{color:"#C17A4A",flexShrink:0}}>•</span>
            <span>{rendered}</span>
          </div>;
        }
        if (isNumbered) {
          return <div key={i} style={{display:"flex",gap:8,marginBottom:3}}>
            <span style={{color:"#C17A4A",fontWeight:700,flexShrink:0}}>{line.trim().match(/^\d+/)[0]}.</span>
            <span>{line.trim().replace(/^\d+\.\s*/,"")}</span>
          </div>;
        }
        if (line.trim() === "") return <div key={i} style={{height:6}}/>;
        return <div key={i} style={{marginBottom:2}}>{rendered}</div>;
      })}
    </div>
  );
}

// ─── APP ROOT ─────────────────────────────────────────────────────────────────
function App(){
  const [authState,setAuthState]=useState("checking"); // checking | unauthenticated | authenticated
  const [user,setUser]=useState(null);
  const [screen,setScreen]=useState("dashboard");
  const [activeDay,setActiveDay]=useState(todayKey());
  const saveTimeout = useRef(null);

  const { profile, targets, daily, setDaily, loaded, saveProfile, saveDaily } = useFirebaseData(user?.uid);

  // Auth listener
  useEffect(()=>{
    const { auth, onAuthStateChanged } = getFirebase();
    // Wait for firebase module to be ready
    const check = ()=>{
      if(!window.__firebase){ setTimeout(check, 100); return; }
      const unsub = onAuthStateChanged(auth, u=>{
        setUser(u);
        setAuthState(u ? "authenticated" : "unauthenticated");
      });
      return unsub;
    };
    const unsub = check();
    return ()=>{ if(typeof unsub==="function") unsub(); };
  },[]);

  const blank={meals:{breakfast:[],lunch:[],dinner:[],snacks:[]},exercises:[],weight:null,committed:false};

  // Debounced save to Firestore whenever daily changes
  const debouncedSave = useCallback((newDaily)=>{
    if(saveTimeout.current) clearTimeout(saveTimeout.current);
    saveTimeout.current = setTimeout(()=>{ saveDaily(newDaily); }, 800);
  },[saveDaily]);

  const upLog=(day,fn)=>{
    setDaily(prev=>{
      const ex=prev[day]||blank;
      const updated={...prev,[day]:fn(ex)};
      debouncedSave(updated);
      return updated;
    });
  };

  const last7=Array.from({length:7},(_,i)=>{
    const d=new Date(); d.setDate(d.getDate()-(6-i));
    const k=d.toISOString().slice(0,10);
    return{date:k,weight:daily[k]?.weight||null,label:d.toLocaleDateString("en",{weekday:"short"})};
  });

  const handleSignOut=()=>{
    const { auth, signOut } = getFirebase();
    signOut(auth);
    setScreen("dashboard");
  };

  // ── States ──
  if(authState==="checking") return <LoadingScreen msg="Connecting..."/>;
  if(authState==="unauthenticated") return <AuthScreen onAuth={u=>{setUser(u);setAuthState("authenticated");}}/>;
  if(!loaded) return <LoadingScreen msg="Loading your data..."/>;

  // First time onboarding
  if(!profile) return (
    <Onboard
      prefillName={user?.displayName||""}
      onDone={async p=>{
        const bmr=calcBMR(p);
        const tdee=calcTDEE(bmr,p.activity);
        const diff=p.targetWeight-p.weight;
        const t=calcMacros(tdee,p.goal,p.weight,diff,p.weeks||12);
        await saveProfile(p, t);
      }}
    />
  );

  const todayCommitted=!!(daily[todayKey()]?.committed);
  const NAV=[{id:"dashboard",icon:"⬡",label:"Home"},{id:"log",icon:"＋",label:"Log"},{id:"train",icon:"▲",label:"Train"},{id:"progress",icon:"◎",label:"Progress"},{id:"chat",icon:"✦",label:"AI"},{id:"profile",icon:"◈",label:"Profile"}];
  const TITLES={dashboard:"Dashboard",log:"Food Log",train:"Training",progress:"Progress",chat:"AI Coach",profile:"Profile"};

  return(
    <div style={{minHeight:"100vh",background:"#F5F0E8",color:"#fff",fontFamily:"DM Sans,system-ui,sans-serif",maxWidth:430,margin:"0 auto",position:"relative"}}>
      <div style={{padding:"18px 20px 12px",display:"flex",justifyContent:"space-between",alignItems:"center",position:"sticky",top:0,background:"rgba(245,240,232,.95)",backdropFilter:"blur(20px)",zIndex:10,borderBottom:"1px solid #DDD6CC"}}>
        <div>
          <div style={{fontSize:10,color:"#A8A09A",fontWeight:600,letterSpacing:".12em",textTransform:"uppercase"}}>
            {new Date().toLocaleDateString("en",{weekday:"long",month:"short",day:"numeric"})}
            {todayCommitted&&<span style={{marginLeft:8,color:"#D4956A"}}>🔒 TODAY COMMITTED</span>}
          </div>
          <div style={{fontFamily:"'Fraunces',Georgia,serif",fontSize:21,fontWeight:700,letterSpacing:"-.01em",color:"#1A1814"}}>{TITLES[screen]}</div>
        </div>
        <div style={{width:40,height:40,borderRadius:13,background:"#C17A4A",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,fontWeight:900}}>
          {(profile?.name||"M")[0].toUpperCase()}
        </div>
      </div>

      <div style={{padding:"14px 16px 100px"}}>
        {screen==="dashboard"&&<Dashboard targets={targets} daily={daily} last7={last7} profile={profile} activeDay={activeDay} setActiveDay={setActiveDay} blank={blank}
          onCommit={day=>upLog(day,l=>({...l,committed:true}))}/>}
        {screen==="log"     &&<LogFood daily={daily} targets={targets} activeDay={activeDay} setActiveDay={setActiveDay} blank={blank}
          onAdd={(day,m,f)=>upLog(day,l=>({...l,meals:{...l.meals,[m]:[...l.meals[m],f]}}))}
          onRemove={(day,m,i)=>upLog(day,l=>({...l,meals:{...l.meals,[m]:l.meals[m].filter((_,x)=>x!==i)}}))}/>}
        {screen==="train"   &&<Training daily={daily} activeDay={activeDay} setActiveDay={setActiveDay} blank={blank}
          onAddEx={(day,e)=>upLog(day,l=>({...l,exercises:[...(l.exercises||[]),e]}))}
          onRemoveEx={(day,i)=>upLog(day,l=>({...l,exercises:(l.exercises||[]).filter((_,x)=>x!==i)}))}/>}
        {screen==="progress"&&<Progress last7={last7} profile={profile} targets={targets} daily={daily} activeDay={activeDay} setActiveDay={setActiveDay} blank={blank}
          onWeightEntry={(day,w)=>upLog(day,l=>({...l,weight:parseFloat(w)}))}/>}
        {screen==="chat"    &&<AIChat profile={profile} targets={targets} workerUrl="https://dark-brook-b36f.brahmalabs-ai.workers.dev"/>}
        {screen==="profile" &&<Profile profile={profile} targets={targets} onSignOut={handleSignOut}
          onUpdate={async p=>{
            const bmr=calcBMR(p);
            const tdee=calcTDEE(bmr,p.activity);
            const diff=p.targetWeight-p.weight;
            const t=calcMacros(tdee,p.goal,p.weight,diff,p.weeks||12);
            await saveProfile(p,t);
          }}/>}
      </div>

      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"min(430px,100vw)",background:"rgba(245,240,232,.97)",backdropFilter:"blur(24px)",borderTop:"1px solid #DDD6CC",display:"flex",padding:"8px 0 14px",zIndex:20}}>
        {NAV.map(n=><button key={n.id} onClick={()=>setScreen(n.id)} style={{flex:1,background:"none",border:"none",cursor:"pointer",padding:"6px 0",display:"flex",flexDirection:"column",alignItems:"center",gap:3,color:screen===n.id?"#C17A4A":"#A8A09A",transition:"color .2s",fontFamily:"DM Sans,sans-serif"}}>
          <span style={{fontSize:n.id==="log"?22:17,lineHeight:1}}>{n.icon}</span>
          <span style={{fontSize:9,fontWeight:700,letterSpacing:".06em"}}>{n.label}</span>
        </button>)}
      </div>
    </div>
  );
}

// Wait for Firebase module to load before rendering
function Root(){
  const [ready,setReady]=useState(!!window.__firebase);
  useEffect(()=>{
    if(window.__firebase){setReady(true);return;}
    const t=setInterval(()=>{ if(window.__firebase){setReady(true);clearInterval(t);} },100);
    return()=>clearInterval(t);
  },[]);
  if(!ready) return <LoadingScreen msg="Initializing..."/>;
  return <App/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
</script>
